<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mastering Claude Code — Interactive Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #07070f;
  --bg2: #0e0e1c;
  --bg3: #13132a;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #e2e8f0;
  --muted: #64748b;
  --subtle: #94a3b8;
  --orange: #f59e0b;
  --blue: #3b82f6;
  --green: #4ade80;
  --red: #f87171;
  --font: 'Inter', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --sidebar-w: 260px;
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* ── Layout ── */
.shell { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100vh;
  background: rgba(0,0,0,0.4);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(20px);
  z-index: 10;
  overflow: hidden;
}
.sidebar-brand {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-brand .logo { font-weight: 800; font-size: 13px; letter-spacing: 0.12em; color: var(--orange); text-transform: uppercase; }
.sidebar-brand .title { font-size: 11px; color: var(--muted); margin-top: 4px; }

.progress-bar-wrap { padding: 14px 20px; border-bottom: 1px solid var(--border); }
.progress-label { font-size: 11px; color: var(--muted); margin-bottom: 7px; display: flex; justify-content: space-between; }
.progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange), #f97316); border-radius: 99px; transition: width 0.6s ease; }

.sidebar-timer { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.timer-icon { font-size: 12px; }
.timer-val { font-size: 12px; color: var(--subtle); font-variant-numeric: tabular-nums; font-family: var(--mono); }

.module-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
.module-nav::-webkit-scrollbar { width: 4px; }
.module-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; cursor: pointer;
  transition: var(--transition); position: relative;
}
.nav-item:hover { background: var(--surface-hover); }
.nav-item.active { background: var(--surface); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--module-color, var(--orange));
}
.nav-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--muted);
  flex: 0 0 auto; transition: var(--transition);
}
.nav-item.done .nav-dot {
  background: var(--green); border-color: var(--green); color: #000;
  font-size: 13px;
}
.nav-item.active .nav-dot {
  border-color: var(--module-color, var(--orange));
  color: var(--module-color, var(--orange));
}
.nav-item-text { flex: 1; min-width: 0; }
.nav-item-num { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.nav-item-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.kbd-hints { display: flex; flex-direction: column; gap: 5px; }
.kbd-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
kbd { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; padding: 1px 5px; font-family: var(--mono); font-size: 10px; color: var(--subtle); }

/* ── Main ── */
.main { flex: 1; height: 100vh; overflow: hidden; position: relative; }
.stage { width: 100%; height: 100vh; overflow-y: auto; }
.stage::-webkit-scrollbar { width: 5px; }
.stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

.module-view { display: none; animation: fadeSlide 0.4s ease; }
.module-view.active { display: block; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Module Header ── */
.module-header {
  padding: 40px 56px 32px;
  background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 5;
  backdrop-filter: blur(20px);
}
.module-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--module-color); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.module-eyebrow::before { content: ''; display: block; width: 24px; height: 2px; background: var(--module-color); border-radius: 2px; }
.module-title-row { display: flex; align-items: center; gap: 16px; }
.module-icon { font-size: 32px; }
.module-h1 { font-size: 36px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
.module-subtitle { font-size: 15px; color: var(--subtle); margin-top: 6px; }

/* ── Content areas ── */
.module-body { padding: 40px 56px 100px; max-width: 1000px; }

/* ── Scenario ── */
.scenario-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid var(--border);
  border-left: 4px solid var(--module-color);
  border-radius: var(--radius);
  padding: 28px 32px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.scenario-card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px; border-radius: 50%;
  background: var(--module-color); opacity: 0.05;
}
.scenario-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--module-color); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.scenario-label svg { width: 14px; height: 14px; }
.scenario-story { font-size: 15px; line-height: 1.75; color: var(--text); }
.scenario-story strong { color: #fff; }
.scenario-chars { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.char-chip {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 12px 5px 5px;
  font-size: 12px; color: var(--subtle);
}
.char-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #000;
}

/* ── Problem Options ── */
.section-heading { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 14px; margin-top: 28px; }

.options-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.option-card {
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 18px 20px; cursor: pointer;
  transition: var(--transition); position: relative;
  background: var(--surface);
}
.option-card:hover { border-color: var(--border-hover); background: var(--surface-hover); }
.option-card.selected-wrong { border-color: var(--red); background: rgba(248,113,113,0.06); }
.option-card.selected-right { border-color: var(--green); background: rgba(74,222,128,0.06); }
.option-icon { font-size: 20px; margin-bottom: 10px; }
.option-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.option-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.option-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 11px; font-weight: 700; padding: 2px 8px;
  border-radius: 99px; display: none;
}
.option-card.selected-right .option-badge { display: block; background: var(--green); color: #000; }
.option-card.selected-wrong .option-badge { display: block; background: var(--red); color: #fff; }

/* ── Tasks ── */
.tasks-section { margin-bottom: 32px; }
.task-list { display: flex; flex-direction: column; gap: 10px; }
.task-item {
  display: flex; gap: 16px; align-items: flex-start;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 20px;
  transition: var(--transition); cursor: default;
}
.task-item.done { opacity: 0.65; }
.task-item.done .task-content { text-decoration: none; }
.task-check {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border-hover); flex: 0 0 auto;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: var(--transition); margin-top: 1px;
}
.task-item.done .task-check { background: var(--green); border-color: var(--green); }
.task-content { flex: 1; }
.task-step { font-size: 11px; font-weight: 700; color: var(--module-color); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
.task-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.task-desc { font-size: 13px; color: var(--subtle); line-height: 1.6; }
.task-code {
  margin-top: 10px; background: #0a0a14; border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px; padding: 12px 14px;
  font-family: var(--mono); font-size: 12.5px; color: #a5b4fc;
  line-height: 1.6; position: relative;
}
.task-code .copy-btn {
  position: absolute; top: 8px; right: 8px;
  background: rgba(255,255,255,0.07); border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px; padding: 3px 8px;
  font-size: 10px; cursor: pointer; font-family: var(--font);
  transition: var(--transition);
}
.task-code .copy-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
.task-code .copy-btn.copied { color: var(--green); border-color: var(--green); }

/* ── Complete button ── */
.complete-btn {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, var(--module-color), color-mix(in srgb, var(--module-color) 70%, #fff));
  color: #000; border: none; border-radius: 12px;
  padding: 14px 28px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: var(--transition);
  font-family: var(--font); margin-top: 28px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.complete-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.complete-btn:active { transform: translateY(0); }
.complete-btn.done { background: linear-gradient(135deg, #4ade80, #22c55e); }

/* ── Best Version Reveal ── */
.best-version {
  margin-top: 32px; border: 1px solid var(--module-color);
  border-radius: var(--radius); overflow: hidden;
  display: none; animation: revealDown 0.5s ease;
}
.best-version.visible { display: block; }
@keyframes revealDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.best-version-header {
  background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
  padding: 16px 22px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.best-version-header .bv-icon { font-size: 18px; }
.best-version-header h3 { font-size: 14px; font-weight: 700; color: var(--module-color); }
.best-version-header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
.best-version-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 22px; }
.bv-tab {
  padding: 10px 16px; font-size: 12px; font-weight: 600;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: var(--transition); margin-bottom: -1px;
}
.bv-tab.active { color: var(--module-color); border-bottom-color: var(--module-color); }
.bv-panel { display: none; padding: 22px; }
.bv-panel.active { display: block; }
.bv-code {
  background: #060610; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 18px 20px;
  font-family: var(--mono); font-size: 12.5px; line-height: 1.7;
  overflow-x: auto; white-space: pre; color: #cbd5e1;
  position: relative;
}
.bv-code .copy-btn {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--muted); border-radius: 6px; padding: 4px 10px;
  font-size: 11px; cursor: pointer; font-family: var(--font);
  transition: var(--transition);
}
.bv-code .copy-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }
.bv-code .copy-btn.copied { color: var(--green); }
.hl-comment { color: #4a5568; }
.hl-key { color: #f6c177; }
.hl-str { color: #a3d295; }
.hl-val { color: #8ec5fc; }
.hl-head { color: #fc8181; font-weight: 700; }
.hl-cmd { color: #f97316; }
.hl-ok { color: #4ade80; }

.annotation-list { display: flex; flex-direction: column; gap: 10px; }
.annotation {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 14px; background: rgba(255,255,255,0.03);
  border-radius: 10px; border: 1px solid var(--border);
}
.annotation-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--module-color); color: #000;
  font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center;
  flex: 0 0 auto;
}
.annotation-text { font-size: 13px; color: var(--subtle); line-height: 1.6; }
.annotation-text strong { color: var(--text); }

/* ── Takeaways ── */
.takeaways { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
.takeaway {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; color: var(--subtle); line-height: 1.5;
  display: flex; gap: 10px; align-items: flex-start;
  flex: 1 1 280px;
}
.takeaway-icon { font-size: 16px; flex: 0 0 auto; margin-top: 1px; }

/* ── Nav buttons ── */
.module-nav-btns {
  position: fixed; bottom: 28px; right: 40px;
  display: flex; gap: 10px; z-index: 100;
}
.nav-btn {
  background: rgba(15,15,30,0.85); border: 1px solid var(--border);
  color: var(--text); border-radius: 12px; padding: 11px 20px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: var(--font); transition: var(--transition);
  backdrop-filter: blur(12px); display: flex; align-items: center; gap: 8px;
}
.nav-btn:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.06); }
.nav-btn.primary { background: var(--module-color); color: #000; border-color: transparent; }
.nav-btn.primary:hover { opacity: 0.9; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Confetti ── */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
.confetti-piece {
  position: absolute; width: 8px; height: 8px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ── Completion screen ── */
.completion-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; text-align: center; padding: 40px;
}
.completion-screen.show { display: flex; }
.completion-emoji { font-size: 72px; margin-bottom: 24px; animation: bounce 1s ease infinite alternate; }
@keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
.completion-title { font-size: 48px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 12px; background: linear-gradient(135deg, var(--orange), #f97316, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.completion-sub { font-size: 18px; color: var(--subtle); max-width: 520px; line-height: 1.6; }
.completion-badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 32px; }
.badge {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 99px; padding: 8px 16px; font-size: 13px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}

/* ── Misc ── */
.divider { height: 1px; background: var(--border); margin: 28px 0; }
.callout {
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px;
  font-size: 13px; color: var(--subtle); line-height: 1.6; margin-top: 14px;
}
.callout strong { color: var(--text); }
.callout.warn { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.06); }
.callout.good { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.06); }
</style>
</head>
<body>
<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="logo">Presidio</div>
      <div class="title">Mastering Claude Code</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label"><span>Progress</span><span id="progress-text">0 / 9</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="sidebar-timer">
      <span class="timer-icon">⏱</span>
      <span class="timer-val" id="timer">00:00</span>
      <span class="timer-val" style="margin-left:4px;color:#374151">· session</span>
    </div>
    <nav class="module-nav" id="module-nav"></nav>
    <div class="sidebar-footer">
      <div class="kbd-hints">
        <div class="kbd-row"><kbd>←</kbd><kbd>→</kbd> Navigate modules</div>
        <div class="kbd-row"><kbd>Space</kbd> Mark complete</div>
      </div>
    </div>
  </aside>

  <!-- Main stage -->
  <main class="main">
    <div class="stage" id="stage"></div>
    <div class="completion-screen" id="completion">
      <div class="confetti-wrap" id="confetti"></div>
      <div class="completion-emoji">🎉</div>
      <div class="completion-title">Workshop Complete!</div>
      <div class="completion-sub">You've touched every major Claude Code feature. Your team's AI workflow will never be the same.</div>
      <div class="completion-badges" id="completion-badges"></div>
    </div>
  </main>
</div>

<div class="module-nav-btns">
  <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Previous</button>
  <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">Next →</button>
</div>

<script>

    { title: 'Verify Claude loaded it', desc: 'Ask Claude a question it could only answer from CLAUDE.md.', code: '# In Claude Code:\nWhat test command should I run before submitting a PR?' },

  ],
  bestVersion: {
    tabs: ['The file', 'What to notice', 'Mistakes to avoid'],

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  current: 0,
  done: new Set(),
  tasksDone: {}, // moduleId → Set of task indices
  startTime: Date.now(),
};

// ── Timer ────────────────────────────────────────────────────────────────────
setInterval(() => {
  const s = Math.floor((Date.now() - state.startTime) / 1000);
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const ss = (s % 60).toString().padStart(2, '0');
  document.getElementById('timer').textContent = `${m}:${ss}`;
}, 1000);

// ── Render sidebar ───────────────────────────────────────────────────────────
function renderSidebar() {
  const nav = document.getElementById('module-nav');
  nav.innerHTML = MODULES.map((m, i) => `
    <div class="nav-item ${i === state.current ? 'active' : ''} ${state.done.has(i) ? 'done' : ''}"
         style="--module-color:${m.color}"
         onclick="goTo(${i})">
      <div class="nav-dot">${state.done.has(i) ? '✓' : m.id}</div>
      <div class="nav-item-text">
        <div class="nav-item-num">Module ${String(m.id).padStart(2,'0')}</div>
        <div class="nav-item-title">${m.title}</div>
      </div>
    </div>
  `).join('');

  const done = state.done.size;
  const pct = Math.round(done / MODULES.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${MODULES.length}`;
}

        <div class="takeaways">${takeawaysHtml}</div>
        ` : ''}

      </div>
    </div>
  `;
}

// ── Initial render ───────────────────────────────────────────────────────────
function renderAll() {
  const stage = document.getElementById('stage');
  stage.innerHTML = MODULES.map((m, i) => renderModule(m, i)).join('');
  renderSidebar();
  updateNavButtons();
}

// ── Navigation ───────────────────────────────────────────────────────────────
function goTo(idx) {
  state.current = idx;
  document.querySelectorAll('.module-view').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  document.getElementById('stage').scrollTop = 0;
  renderSidebar();
  updateNavButtons();
}

function navigate(dir) {
  const next = state.current + dir;
  if (next >= 0 && next < MODULES.length) goTo(next);
  else if (next >= MODULES.length) showCompletion();
}

function updateNavButtons() {
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = state.current === 0;
  next.textContent = state.current === MODULES.length - 1 ? 'Finish Workshop →' : 'Next →';
  const m = MODULES[state.current];
  next.style.background = m.color;
}

// ── Option selection ─────────────────────────────────────────────────────────
function selectOption(moduleId, optIdx, correct) {
  const m = MODULES.find(x => x.id === moduleId);
  m.options.forEach((_, i) => {
    const el = document.getElementById(`opt-${moduleId}-${i}`);
    el.classList.remove('selected-right', 'selected-wrong');
  });
  const el = document.getElementById(`opt-${moduleId}-${optIdx}`);
  el.classList.add(correct ? 'selected-right' : 'selected-wrong');
  const fb = document.getElementById(`feedback-${moduleId}`);
  fb.style.display = 'block';
  fb.innerHTML = m.optionFeedback;
}

// ── Task toggle ──────────────────────────────────────────────────────────────
function toggleTask(moduleId, taskIdx) {
  if (!state.tasksDone[moduleId]) state.tasksDone[moduleId] = new Set();
  const s = state.tasksDone[moduleId];
  if (s.has(taskIdx)) s.delete(taskIdx);
  else s.add(taskIdx);

  const item = document.getElementById(`task-${moduleId}-${taskIdx}`);
  const check = item.querySelector('.task-check');
  const isDone = s.has(taskIdx);
  item.classList.toggle('done', isDone);
  check.innerHTML = isDone
    ? '<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/></svg>'
    : '';
}

// ── Mark complete ────────────────────────────────────────────────────────────
function markComplete(idx) {
  const m = MODULES[idx];
  state.done.add(idx);

  const btn = document.getElementById(`complete-btn-${m.id}`);
  btn.textContent = '✓ Section Complete — View Reference Below';
  btn.classList.add('done');

  const bv = document.getElementById(`best-${m.id}`);
  bv.classList.add('visible');

  // Append takeaways if not there
  const body = bv.closest('.module-body');
  if (!body.querySelector('.takeaways')) {
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="divider"></div>
      <div class="section-heading">Key takeaways</div>
      <div class="takeaways">${m.takeaways.map(t =>
        `<div class="takeaway"><span class="takeaway-icon">${t.icon}</span><span>${t.text}</span></div>`
      ).join('')}</div>`;
    body.appendChild(div);
  }

  renderSidebar();
  bv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Best version tabs ────────────────────────────────────────────────────────
function switchBvTab(moduleId, tabIdx) {
  const m = MODULES.find(x => x.id === moduleId);
  const bvEl = document.getElementById(`best-${moduleId}`);
  bvEl.querySelectorAll('.bv-tab').forEach((t, i) => t.classList.toggle('active', i === tabIdx));
  m.bestVersion.panels.forEach((_, i) => {
    const p = document.getElementById(`bvpanel-${moduleId}-${i}`);
    if (p) p.classList.toggle('active', i === tabIdx);
  });
}

// ── Copy code ────────────────────────────────────────────────────────────────
function copyCode(btn) {
  const container = btn.parentElement;
  const text = container.querySelector('span') || container;
  navigator.clipboard.writeText(text.textContent.trim()).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

// ── Completion ───────────────────────────────────────────────────────────────
function showCompletion() {
  if (state.done.size < MODULES.length) {
    // Navigate to finish even if not all done
  }
  document.getElementById('stage').style.display = 'none';
  const c = document.getElementById('completion');
  c.classList.add('show');

  const badges = document.getElementById('completion-badges');
  badges.innerHTML = MODULES.map(m =>
    `<div class="badge"><span>${m.icon}</span>${m.title}</div>`
  ).join('');

  spawnConfetti();
}

function spawnConfetti() {
  const wrap = document.getElementById('confetti');
  const colors = ['#f59e0b','#3b82f6','#8b5cf6','#ec4899','#22c55e','#f97316','#14b8a6'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      width: ${4 + Math.random()*8}px;
      height: ${4 + Math.random()*8}px;
      animation-duration: ${1.5 + Math.random()*2}s;
      animation-delay: ${Math.random()*1}s;
    `;
    wrap.appendChild(el);
  }
}

// ── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ') { e.preventDefault(); markComplete(state.current); }
});

// ── Boot ─────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
